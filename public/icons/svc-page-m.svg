<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Medium screen -->
  <rect x="25" y="10" width="70" height="50" rx="6" fill="white" opacity="0.3"/>
  <rect x="30" y="17" width="60" height="35" rx="3" fill="white" opacity="0.12"/>
  <!-- Content grid -->
  <rect x="34" y="21" width="18" height="13" rx="2" fill="white" opacity="0.4"/>
  <rect x="55" y="21" width="18" height="13" rx="2" fill="white" opacity="0.35"/>
  <rect x="34" y="37" width="18" height="13" rx="2" fill="white" opacity="0.35"/>
  <rect x="55" y="37" width="18" height="13" rx="2" fill="white" opacity="0.3"/>
  <!-- Chart -->
  <rect x="76" y="30" width="10" height="6" rx="1" fill="white" opacity="0.3"/>
  <rect x="76" y="25" width="10" height="11" rx="1" fill="white" opacity="0.2"/>
  <!-- M badge -->
  <circle cx="90" cy="14" r="10" fill="white" opacity="0.55"/>
  <text x="90" y="18" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="bold" font-family="sans-serif">M</text>
  <!-- 10 posts -->
  <rect x="20" y="68" width="35" height="12" rx="6" fill="white" opacity="0.45"/>
  <text x="37" y="77" text-anchor="middle" fill="#3b82f6" font-size="7" font-weight="bold" font-family="sans-serif">10 post</text>
  <!-- 1 campaign -->
  <rect x="62" y="68" width="40" height="12" rx="6" fill="white" opacity="0.4"/>
  <text x="82" y="77" text-anchor="middle" fill="#3b82f6" font-size="6" font-weight="bold" font-family="sans-serif">1 Ads</text>
</svg>
