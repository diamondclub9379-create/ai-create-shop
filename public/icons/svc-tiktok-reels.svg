<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Phone -->
  <rect x="38" y="5" width="44" height="80" rx="8" fill="#1e1b4b" opacity="0.9"/>
  <rect x="42" y="15" width="36" height="55" rx="4" fill="#312e81"/>
  <!-- Video content -->
  <rect x="42" y="15" width="36" height="55" rx="4" fill="#7c3aed" opacity="0.5"/>
  <!-- Play button -->
  <circle cx="60" cy="42" r="12" fill="#f43f5e"/>
  <polygon points="56,36 56,48 67,42" fill="white"/>
  <!-- Music notes -->
  <circle cx="22" cy="22" r="6" fill="#f59e0b"/>
  <rect x="27" y="10" width="2.5" height="13" rx="1" fill="#f59e0b"/>
  <circle cx="98" cy="32" r="5" fill="#06b6d4"/>
  <rect x="102" y="22" width="2" height="11" rx="1" fill="#06b6d4"/>
  <!-- Hearts -->
  <path d="M92 55 C92 51 97 49 99 52 C101 49 106 51 106 55 C106 60 99 64 99 64 C99 64 92 60 92 55Z" fill="#f43f5e"/>
  <!-- Timer -->
  <rect x="47" y="60" width="26" height="8" rx="4" fill="#10b981"/>
  <text x="60" y="67" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="sans-serif">0:60</text>
  <!-- Likes count -->
  <rect x="14" y="58" width="20" height="16" rx="4" fill="#ec4899"/>
  <text x="24" y="69" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="sans-serif">99+</text>
</svg>
