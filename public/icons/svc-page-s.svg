  <!-- Stats -->
  <rect x="5" y="60" width="26" height="22" rx="5" fill="#f59e0b"/>
  <text x="18" y="73" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="sans-serif">5</text>
  <text x="18" y="79" text-anchor="middle" fill="white" font-size="5" font-family="sans-serif">post</text>
  <rect x="89" y="60" width="26" height="22" rx="5" fill="#ec4899"/>
  <text x="102" y="73" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="sans-serif">+1K</text>
  <text x="102" y="79" text-anchor="middle" fill="white" font-size="5" font-family="sans-serif">follow</text>
</svg>
