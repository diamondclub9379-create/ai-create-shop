<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Phone -->
  <rect x="35" y="5" width="50" height="78" rx="10" fill="#1e293b"/>
  <rect x="39" y="18" width="42" height="50" rx="4" fill="#334155"/>
  <!-- Profile area -->
  <circle cx="53" cy="30" r="8" fill="#3b82f6"/>
  <circle cx="53" cy="28" r="5" fill="#60a5fa"/>
  <rect x="65" y="24" width="14" height="3" rx="1.5" fill="#60a5fa"/>
  <rect x="65" y="30" width="10" height="2" rx="1" fill="#94a3b8"/>
  <!-- Post image -->
  <rect x="42" y="40" width="36" height="22" rx="3" fill="#8b5cf6"/>
  <circle cx="52" cy="48" r="4" fill="#fbbf24"/>
  <path d="M42 58 L55 48 L65 54 L78 46 L78 62 L42 62Z" fill="#06b6d4" opacity="0.6"/>
  <!-- S badge -->
  <circle cx="78" cy="12" r="11" fill="#10b981"/>
