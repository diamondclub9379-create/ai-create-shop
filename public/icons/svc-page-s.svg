<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Small phone -->
  <rect x="40" y="10" width="40" height="65" rx="8" fill="white" opacity="0.3"/>
  <rect x="45" y="22" width="30" height="38" rx="3" fill="white" opacity="0.15"/>
  <!-- Profile pic -->
  <circle cx="55" cy="32" r="6" fill="white" opacity="0.5"/>
  <!-- Post thumbnail -->
  <rect x="48" y="42" width="24" height="14" rx="2" fill="white" opacity="0.35"/>
  <!-- S badge -->
  <circle cx="72" cy="18" r="10" fill="white" opacity="0.55"/>
  <text x="72" y="22" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold" font-family="sans-serif">S</text>
  <!-- 5 posts -->
  <rect x="15" y="65" width="28" height="12" rx="6" fill="white" opacity="0.45"/>
  <text x="29" y="74" text-anchor="middle" fill="#3b82f6" font-size="7" font-weight="bold" font-family="sans-serif">5 post</text>
  <!-- 1000 followers -->
  <rect x="78" y="65" width="30" height="12" rx="6" fill="white" opacity="0.4"/>
  <text x="93" y="74" text-anchor="middle" fill="#3b82f6" font-size="6" font-weight="bold" font-family="sans-serif">+1,000</text>
</svg>
