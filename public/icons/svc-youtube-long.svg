<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- YouTube player -->
  <rect x="15" y="15" width="90" height="52" rx="8" fill="white" opacity="0.3"/>
  <rect x="20" y="20" width="80" height="42" rx="4" fill="white" opacity="0.1"/>
  <!-- Play button -->
  <circle cx="60" cy="41" r="14" fill="white" opacity="0.35"/>
  <polygon points="55,34 55,48 68,41" fill="white" opacity="0.9"/>
  <!-- Progress bar -->
  <rect x="20" y="56" width="80" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <rect x="20" y="56" width="50" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Thumbnail badge -->
  <rect x="75" y="72" width="30" height="12" rx="6" fill="white" opacity="0.5"/>
  <text x="90" y="81" text-anchor="middle" fill="#7c3aed" font-size="7" font-weight="bold" font-family="sans-serif">HD</text>
  <!-- Duration -->
  <rect x="15" y="72" width="28" height="12" rx="6" fill="white" opacity="0.4"/>
  <text x="29" y="81" text-anchor="middle" fill="#7c3aed" font-size="7" font-weight="bold" font-family="sans-serif">10:00</text>
  <!-- Graphics sparkle -->
  <path d="M95 12 L97 8 L99 12 L103 14 L99 16 L97 20 L95 16 L91 14Z" fill="white" opacity="0.5"/>
</svg>
