<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Screen -->
  <rect x="10" y="10" width="100" height="58" rx="8" fill="#1e1b4b"/>
  <rect x="15" y="15" width="90" height="48" rx="4" fill="#312e81"/>
  <!-- YouTube red play -->
  <rect x="38" y="28" width="44" height="26" rx="6" fill="#ef4444"/>
  <polygon points="53,34 53,48 67,41" fill="white"/>
  <!-- Progress bar -->
  <rect x="15" y="55" width="90" height="4" rx="2" fill="#1e293b"/>
  <rect x="15" y="55" width="55" height="4" rx="2" fill="#ef4444"/>
  <circle cx="70" cy="57" r="4" fill="white"/>
  <!-- Thumbnail icon -->
  <rect x="76" y="72" width="30" height="14" rx="5" fill="#8b5cf6"/>
  <text x="91" y="82" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">HD</text>
  <!-- Duration -->
  <rect x="15" y="72" width="32" height="14" rx="5" fill="#1e293b"/>
  <text x="31" y="82" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="sans-serif">10:00</text>
  <!-- Views -->
  <rect x="50" y="72" width="22" height="14" rx="5" fill="#06b6d4"/>
  <text x="61" y="82" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="sans-serif">1K</text>
</svg>
