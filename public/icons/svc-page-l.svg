<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Large monitor -->
  <rect x="15" y="5" width="90" height="55" rx="6" fill="white" opacity="0.3"/>
  <rect x="20" y="12" width="80" height="40" rx="3" fill="white" opacity="0.12"/>
  <rect x="45" y="60" width="30" height="4" rx="2" fill="white" opacity="0.3"/>
  <rect x="50" y="64" width="20" height="3" rx="1.5" fill="white" opacity="0.2"/>
  <!-- Dashboard layout -->
  <rect x="24" y="16" width="25" height="16" rx="2" fill="white" opacity="0.4"/>
  <rect x="52" y="16" width="25" height="16" rx="2" fill="white" opacity="0.35"/>
  <rect x="80" y="16" width="16" height="16" rx="2" fill="white" opacity="0.3"/>
  <rect x="24" y="35" width="35" height="13" rx="2" fill="white" opacity="0.3"/>
  <rect x="62" y="35" width="34" height="13" rx="2" fill="white" opacity="0.25"/>
  <!-- L badge -->
  <circle cx="100" cy="10" r="10" fill="white" opacity="0.6"/>
  <text x="100" y="14" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="bold" font-family="sans-serif">L</text>
  <!-- Stats -->
  <rect x="15" y="72" width="32" height="12" rx="6" fill="white" opacity="0.45"/>
  <text x="31" y="81" text-anchor="middle" fill="#3b82f6" font-size="7" font-weight="bold" font-family="sans-serif">15 post</text>
  <rect x="52" y="72" width="32" height="12" rx="6" fill="white" opacity="0.4"/>
  <text x="68" y="81" text-anchor="middle" fill="#3b82f6" font-size="6" font-weight="bold" font-family="sans-serif">4 Ads</text>
  <!-- Star -->
  <path d="M97 72 L99 68 L101 72 L105 73 L101 75 L99 79 L97 75 L93 73Z" fill="white" opacity="0.5"/>
</svg>
