<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Large monitor -->
  <rect x="8" y="2" width="104" height="62" rx="6" fill="#1e293b"/>
  <rect x="13" y="8" width="94" height="48" rx="4" fill="#0f172a"/>
  <!-- Dashboard -->
  <rect x="17" y="12" width="28" height="18" rx="3" fill="#8b5cf6"/>
  <rect x="48" y="12" width="28" height="18" rx="3" fill="#3b82f6"/>
  <rect x="79" y="12" width="24" height="18" rx="3" fill="#ec4899"/>
  <!-- Graph bars -->
  <rect x="17" y="44" width="6" height="8" rx="1" fill="#10b981"/>
  <rect x="25" y="40" width="6" height="12" rx="1" fill="#06b6d4"/>
  <rect x="33" y="36" width="6" height="16" rx="1" fill="#8b5cf6"/>
  <rect x="41" y="32" width="6" height="20" rx="1" fill="#f43f5e"/>
  <!-- Engagement chart -->
  <path d="M55 50 L65 42 L75 46 L85 34 L95 38 L105 28" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="105" cy="28" r="3" fill="#fbbf24"/>
  <!-- Stand -->
  <rect x="45" y="64" width="30" height="4" rx="2" fill="#475569"/>
  <rect x="50" y="68" width="20" height="3" rx="1" fill="#334155"/>
  <!-- L badge -->
  <circle cx="105" cy="7" r="10" fill="#f43f5e"/>
  <text x="105" y="12" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="sans-serif">L</text>
  <!-- Stats row -->
  <rect x="5" y="74" width="26" height="14" rx="5" fill="#8b5cf6"/>
  <text x="18" y="84" text-anchor="middle" fill="white" font-size="7" font-weight="bold" font-family="sans-serif">15</text>
  <rect x="34" y="74" width="26" height="14" rx="5" fill="#f59e0b"/>
  <text x="47" y="84" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="sans-serif">4 Ads</text>
  <rect x="63" y="74" width="26" height="14" rx="5" fill="#10b981"/>
  <text x="76" y="84" text-anchor="middle" fill="white" font-size="6" font-weight="bold" font-family="sans-serif">CI</text>
  <!-- Star -->
  <path d="M98 74 L100 70 L102 74 L106 75.5 L102 77 L100 81 L98 77 L94 75.5Z" fill="#fbbf24"/>
</svg>
